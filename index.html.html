<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 R & D</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #e8547a;
  --rose-light: #f7a8bc;
  --rose-pale: #fdf0f4;
  --rose-deep: #c0395c;
  --blush: #fce8ef;
  --cream: #fffaf8;
  --text: #2d1a22;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
}

.app { max-width: 700px; margin: auto; padding: 20px; }

.header { text-align: center; margin-bottom: 20px; }
.header h1 {
  font-family: 'Playfair Display', serif;
  color: var(--rose-deep);
}

.card {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  border: 1px solid var(--blush);
}

textarea, input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--blush);
  margin-top: 8px;
}

button {
  background: var(--rose);
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="app">

<div class="header">
  <h1>💖 R & D</h1>
  <p>Us, every Friday</p>
</div>

<div class="card">
  <h3>🫶 Rules of Our Friday</h3>
  <p>- No blaming, only sharing</p>
  <p>- Focus on patterns</p>
  <p>- Always end with appreciation</p>
</div>

<div class="card">
  <h3>🧠 Communication</h3>
  <input placeholder="Score /10">
  <textarea placeholder="Notes"></textarea>
</div>

<div class="card">
  <h3>❤️ Emotional Presence</h3>
  <input placeholder="Score /10">
  <textarea placeholder="Notes"></textarea>
</div>

<div class="card">
  <h3>🫶 What I needed but didn’t say</h3>
  <textarea placeholder="Say it here..."></textarea>
</div>

<div class="card">
  <h3>🏆 Best Moment</h3>
  <textarea></textarea>
</div>

<button onclick="save()">Save 💾</button>

</div>

<script>
function save() {
  alert('Saved ❤️');
}
</script>

</body>
</html>
